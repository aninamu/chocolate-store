name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    env:
      MONGODB_ENABLED: "true"
      MONGODB_URL: mongodb://127.0.0.1:27017/chocolate_store
      DB_READ_SOURCE_CHOCOLATES: mongo
      DB_WRITE_MODE_ORDERS: mongo
      REDIS_URL: redis://127.0.0.1:63790/0
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd="mongosh --eval \"db.adminCommand('ping')\""
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7
        ports:
          - 63790:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m venv backend/.venv
          backend/.venv/bin/pip install -U pip
          backend/.venv/bin/pip install -e "backend[dev]"

      - name: Initialize Mongo schema and seed data
        run: |
          cd backend
          .venv/bin/python -m app.init_mongo

      - name: Run backend tests
        run: make test-backend

  frontend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Run frontend tests
        run: make test-frontend
