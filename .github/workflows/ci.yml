name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://chocolate@127.0.0.1:55432/chocolate_store
      REDIS_URL: redis://127.0.0.1:63790/0
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: chocolate
          POSTGRES_DB: chocolate_store
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 55432:5432
        options: >-
          --health-cmd="pg_isready -U chocolate -d chocolate_store"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7
        ports:
          - 63790:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build backend
        run: cargo build --manifest-path backend/Cargo.toml --release

      - name: Initialize schema and seed data
        run: cargo run --manifest-path backend/Cargo.toml --release --bin init_db

      - name: Run backend tests
        run: make test-backend

  frontend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Run frontend tests
        run: make test-frontend
