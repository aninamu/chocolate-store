name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    env:
      MONGODB_URL: mongodb://127.0.0.1:57017/chocolate_store?replicaSet=rs0
      REDIS_URL: redis://127.0.0.1:63790/0
    services:
      mongo:
        image: mongo:7
        ports:
          - 57017:27017
        options: >-
          --health-cmd="mongosh --eval \"db.adminCommand('ping')\""
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
          --replSet rs0
      redis:
        image: redis:7
        ports:
          - 63790:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m venv backend/.venv
          backend/.venv/bin/pip install -U pip
          backend/.venv/bin/pip install -e "backend[dev]"

      - name: Install mongosh
        run: |
          curl -fsSL "https://downloads.mongodb.com/compass/mongosh-2.3.8-linux-x64.tgz" -o /tmp/mongosh.tgz
          tar -xzf /tmp/mongosh.tgz -C /tmp
          sudo install -m 755 /tmp/mongosh-linux-x64/bin/mongosh /usr/local/bin/mongosh

      - name: Initialize MongoDB replica set
        run: |
          for i in $(seq 1 30); do
            if mongosh --port 57017 --quiet --eval "db.adminCommand('ping').ok" 2>/dev/null | grep -q 1; then
              break
            fi
            sleep 1
          done
          mongosh --port 57017 --quiet --eval "
            try {
              rs.status();
            } catch (e) {
              rs.initiate({
                _id: 'rs0',
                members: [{ _id: 0, host: '127.0.0.1:27017' }],
              });
            }
          "
          for i in $(seq 1 30); do
            if mongosh --port 57017 --quiet --eval "rs.isMaster().ismaster" 2>/dev/null | grep -q true; then
              exit 0
            fi
            sleep 1
          done
          echo "MongoDB replica set failed to elect a primary" >&2
          exit 1

      - name: Initialize schema and seed data
        run: |
          cd backend
          .venv/bin/python -m app.init_db

      - name: Run backend tests
        run: make test-backend

  frontend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Run frontend tests
        run: make test-frontend
