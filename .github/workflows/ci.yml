name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    env:
      MONGODB_URL: mongodb://127.0.0.1:57017
      MONGO_DB: chocolate_store
      REDIS_URL: redis://127.0.0.1:63790/0
    services:
      mongo:
        image: mongo:7
        ports:
          - 57017:27017
      redis:
        image: redis:7
        ports:
          - 63790:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m venv backend/.venv
          backend/.venv/bin/pip install -U pip
          backend/.venv/bin/pip install -e "backend[dev]"

      - name: Wait for MongoDB
        run: |
          for _ in $(seq 1 30); do
            if backend/.venv/bin/python -c "import os; from pymongo import MongoClient; MongoClient(os.environ['MONGODB_URL'], serverSelectionTimeoutMS=1000).admin.command('ping')"; then
              exit 0
            fi
            sleep 1
          done
          echo "MongoDB not ready" >&2
          exit 1

      - name: Initialize database and seed data
        run: |
          cd backend
          .venv/bin/python -m app.init_db

      - name: Run backend tests
        run: make test-backend

  frontend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Run frontend tests
        run: make test-frontend
